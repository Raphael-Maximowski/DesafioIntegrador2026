[project]
name = "api-django"
version = "0.0.0"
description = "Domain-oriented Django API (Django + Ninja)."
requires-python = ">=3.11"
dependencies = [
    "django>=5.1,<5.3",
    "django-ninja>=1.3.0",
    "django-cors-headers>=4.6.0",
    "django-environ>=0.11.2",
    "psycopg[binary]>=3.2.0",
    "scikit-learn>=1.5.0",
    "pandas>=2.2.0",
    "numpy>=2.0.0",
    "joblib>=1.4.0",
    "celery>=5.4.0",
    "redis>=5.2.0",
]

[dependency-groups]
dev = [
    "ruff>=0.8.0",
    "pytest>=8.3.0",
    "pytest-django>=4.9.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
python_files = ["test_*.py", "*_test.py", "tests.py"]
