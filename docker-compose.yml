x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.docker
  DJANGO_SECRET_KEY: dev-insecure-change-me
  DJANGO_DEBUG: "True"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api-django
  DATABASE_URL: postgres://app:app@postgres-django:5432/app
  CORS_ALLOWED_ORIGINS: http://localhost:3000
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  MODEL_ARTIFACT_DIR: artifacts

services:
  postgres-django:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata-django:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-nest:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - pgdata-nest:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/readyz"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-django:
    build: ./packages/api-django
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment: *django-env
    volumes:
      - ./packages/api-django:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres-django:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./packages/api-django
    command: celery -A config.celery worker -l info
    environment: *django-env
    volumes:
      - ./packages/api-django:/app
    depends_on:
      postgres-django:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-nest:
    build: ./packages/api-nest
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://app:app@postgres-nest:5432/app
      TYPEORM_SYNC: "true"
      REDIS_URL: redis://redis:6379/2
      JWT_SECRET: dev-insecure-change-me
      JWT_ACCESS_TTL: "900"
      REFRESH_TTL: "604800"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      MAIL_FROM: no-reply@desafio.local
      OTP_TTL: "300"
      OTP_MAX_ATTEMPTS: "5"
      OTP_RESEND_COOLDOWN: "60"
    volumes:
      - ./packages/api-nest:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres-nest:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  web:
    build: ./app/web
    environment:
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_DJANGO_API: http://localhost:8000/api
      NEXT_PUBLIC_NEST_API: http://localhost:3001/api
    volumes:
      - ./app/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api-django
      - api-nest

volumes:
  pgdata-django:
  pgdata-nest:
